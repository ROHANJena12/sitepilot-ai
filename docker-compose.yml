# SitePilot AI — local development orchestration
# Responsibility: Compose services for web, api, database, and cache.
# Production images use apps/api/Dockerfile (multi-stage). See docs/DEPLOYMENT.md.

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: sitepilot
      POSTGRES_PASSWORD: sitepilot
      POSTGRES_DB: sitepilot
    ports:
      - "5434:5432"
    volumes:
      - sitepilot_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sitepilot -d sitepilot"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # API — build when needed: docker compose --profile api up --build api
  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - ./apps/api/.env.example
    environment:
      DATABASE_URL: postgresql+asyncpg://sitepilot:sitepilot@db:5432/sitepilot
      REDIS_URL: redis://redis:6379/0
      ENVIRONMENT: development
      DEBUG: "false"
      RATE_LIMIT_ENABLED: "true"
      SECURITY_HEADERS_ENABLED: "true"
      CORS_ORIGINS: http://localhost:3000,http://127.0.0.1:3000
      SECRET_KEY: local-compose-secret-change-me
      PUBLIC_WEB_URL: http://localhost:3000
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    profiles:
      - api

volumes:
  sitepilot_pg_data:
